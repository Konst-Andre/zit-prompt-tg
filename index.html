    '<div class="field" style="margin-bottom:0"><div class="f-hdr"><label class="lbl">'+t('apiModelLabel')+'</label></div>' + mOpts + '</div>' +
    '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between">' +
      '<span style="font-size:11px;color:var(--t4)">🔬 Debug Log' + (S.dbgLog?(S.dbgLog.httpOk?' <span style="color:var(--green-txt)">✓</span>':' <span style="color:var(--red-txt)">✗</span>'):'') + '</span>' +
      '<button class="btn-ghost" id="b-dbg-open" style="font-size:11px;padding:3px 10px">' + (S.dbgOpen?'Hide ↑':'Open ↗') + '</button>' +
    '</div>' +
  '</div>';
}

function buildDebugPanel() {
  if (!S.dbgOpen) return '';
  var lg = S.dbgLog, dbInner;
  if (!lg) {
    dbInner = '<p style="color:var(--t4);font-size:12px;margin:0">'+t('dbgEmpty')+'</p>';
  } else {
    var badges = '';
    if (lg.httpStatus!=null) badges += '<span class="dbadge" style="background:'+(lg.httpOk?'var(--green-bg)':'var(--red-bg)')+';color:'+(lg.httpOk?'var(--green-txt)':'var(--red-txt)')+';border:1px solid '+(lg.httpOk?'var(--green-bdr)':'var(--red-bdr)')+'">HTTP '+lg.httpStatus+' '+(lg.httpOk?'✓':'✗')+'</span>';
    if (lg.model) badges += '<span class="dbadge" style="background:var(--acc-bg);color:var(--acc-txt);border:1px solid var(--acc)">'+esc(lg.model.split('/').pop())+'</span>';
    if (lg.responseMs) badges += '<span class="dbadge" style="background:var(--amber-bg);color:var(--amber-txt);border:1px solid var(--amber-bdr)">'+lg.responseMs+'ms</span>';
    badges += '<button class="btn-ghost" id="b-cp-log" style="font-size:10px;padding:3px 8px">'+t('dbgCopyLog')+'</button>';
    dbInner = '<div class="dbg-badges" style="margin-bottom:12px">'+badges+'</div>' +
      '<div class="dbg-sec"><div class="dbg-lbl">Stripped content (think removed)</div>' +
      '<pre class="dbg-pre '+(lg.strippedText?'ok':'err')+'">'+esc(lg.strippedText||'⚠ EMPTY — this is the problem')+'</pre></div>' +
      (lg.sentUser ? '<details><summary>Sent to API — user message</summary><pre class="dbg-pre">'+esc(lg.sentUser.slice(0,1500))+'</pre></details>' : '') +
      '<details><summary>Full raw HTTP response</summary><pre class="dbg-pre">'+esc(lg.rawText?lg.rawText.slice(0,2000):'empty')+'</pre></details>';
  }
  return '<div class="slide-panel debug-bg"><div class="sp-hdr"><div class="sp-title muted">DEBUG LOG</div>' +
    '<button class="btn-ghost" id="b-dbg-close" style="padding:3px 8px">✕</button></div>'+dbInner+'</div>';
}

function buildTabBar(mob) {
  if (mob) return '';
  return '<div class="tab-bar">' +
    '<button class="tab-btn'+(S.mode==='generate'?' active':'')+'" data-mode="generate">'+t('tabGenerate')+'</button>' +
    '<button class="tab-btn'+(S.mode==='enhance'?' active':'')+'" data-mode="enhance">'+t('tabOptimize')+' <span style="font-size:10px;font-weight:400;opacity:.55;letter-spacing:.01em">'+t('tabOptimizeNote')+'</span></button>' +
  '</div>';
}

function buildLeftCol(mob) {
  var pHide = mob && S.mobilePane !== 'params';
  var h = '<div class="col col-l'+(pHide?' pane-hidden':'')+'">';

  if (mob) {
    h += '<div class="mob-mode-sw" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s2);margin-bottom:16px">' +
      '<button class="btn-primary'+(S.mode==='generate'?'':' btn-secondary')+'" data-mode="generate" style="margin-top:0;font-size:12px;padding:10px 4px">'+t('tabGenerate')+'</button>' +
      '<button class="btn-primary'+(S.mode==='enhance'?'':' btn-secondary')+'" data-mode="enhance" style="margin-top:0;font-size:12px;padding:10px 4px">'+t('tabOptimize')+'</button>' +
    '</div>';
  }

  if (S.mode === 'generate') {
    /* SUBJECT */
    var stNow = STYLES.find(function(x){return x.id===S.style;}) || {};
    var stPh  = stNow.example || 'красива жінка під дощем у Токіо';
    var histHtml = '';
    if (S.subjectHistory.length > 0) {
      histHtml = '<div class="subj-hist">' +
        S.subjectHistory.map(function(s, i){
          return '<span class="subj-hist-item" data-hist="'+i+'" title="'+esc(s)+'">'+esc(s.length>28?s.slice(0,26)+'…':s)+'</span>';
        }).join('') + '</div>';
    }
    var visionStripHtml =
      '<input type="file" id="inp-vision-file" accept="image/jpeg,image/png,image/webp" style="display:none">' +
      ( S.visionLoading
        ? '<div class="vs-c-loading"><span class="vs-spin">⟳</span><span class="vs-ltxt">'+t('visionLoading')+'</span></div>'
        : S.visionSuccess
          ? '<div class="vs-c-success"><span class="vs-ok">✓ '+t('visionFill')+'</span><button class="vs-retry" id="b-vision-retry">↺ '+t('visionRetry')+'</button></div>'
          : '<div class="vs-c-zone" id="b-vision"><span class="vs-c-icon">📸</span><div><div class="vs-c-lbl">'+t('visionBtn')+'</div><div class="vs-c-sub">'+t('visionHint')+'</div></div><span class="vs-c-right">'+t('visionDrop').replace(' & ','<br>&nbsp;').replace(' · ','<br>')+'</span></div>'
      );
    h += '<div class="prompt-main">' +
      '<div class="field">' +
        '<div class="f-hdr">' +
          '<label class="lbl">'+t('lPrompt')+'</label>' +
          '<div style="display:flex;align-items:center;gap:6px">' +
            '<span class="hint">'+t('lPromptHint')+'</span>' +
            '<button class="btn-copy" id="b-cp-sub" style="opacity:.6'+(S.subject.trim()?'':';display:none')+'">'+t('btnCopySubject')+'</button>' +
            '<button class="btn-clr" id="b-clr-sub" title="'+t('btnClearTitle')+'"'+(S.subject.trim()?'':' style="display:none"')+'>✕</button>' +
            (loadHistory().length ? '<button class="btn-copy" id="b-hist-subj" style="opacity:.7;font-size:12px" title="'+t('histBtnTitle')+'">📜</button>' : '') +
          '</div>' +
        '</div>' +
        '<textarea id="inp-sub" rows="3" placeholder="e.g: '+esc(stPh)+'&#10;• your own idea here">'+esc(S.subject)+'</textarea>' +
        histHtml +
        visionStripHtml +
        '<div style="text-align:right;font-size:10px;margin-top:8px;opacity:.7">' +
          '<span id="sub-count" style="color:' + (S.subject.length > 300 ? 'var(--amber)' : 'var(--t3)') + '">' + (S.subject.length || '') + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';

    /* SCENE */
    var sceneHtml = getSceneGroups().map(function(grp) {
      var btns = grp.ids.map(function(id) {
        var sc = SCENES.find(function(x){ return x.id === id; });
        if (!sc) return '';
        var iconHtml = (grp.icons && sc.icon) ? '<span class="btn-icon">'+sc.icon+'</span>' : '';
        return '<button class="sel-btn'+(S.scene===id?' active':'')+'" data-scene="'+id+'" title="'+esc(sc.label)+'">'+iconHtml+esc(sc.label)+'</button>';
      }).join('');
      return '<div class="sel-group"><span class="cat-label">'+esc(grp.label)+'</span><div class="sel-row">'+btns+'</div></div>';
    }).join('');
    h += '<div class="sec-block"><div class="f-hdr"><label class="lbl">'+t('lScene')+'</label><span class="hint">'+t('lSceneHint')+'</span></div>'+sceneHtml+'</div>';

    /* SUBJECT TYPE */
    var subjPills = SUBJECTS.map(function(s){
      return '<div class="st-pill'+(S.subjectType===s.id?' active':'')+'" data-subtype="'+s.id+'"'+(s.tip?' title="'+esc(s.tip)+'"':'')+'>'+
        '<span class="st-icon">'+esc(s.icon)+'</span> '+esc(s.label)+'</div>';
    }).join('');
    h += '<div class="sec-block"><div class="f-hdr"><label class="lbl">'+t('lSubjectType')+'</label><span class="hint">'+t('lSubjectHint')+'</span></div><div class="pill-row" style="margin-bottom:0">'+subjPills+'</div></div>';

    /* STYLE */
    var styleHtml = getStyleGroups().map(function(grp) {
      var btns = grp.ids.map(function(id) {
        var st = STYLES.find(function(x){ return x.id === id; });
        if (!st) return '';
        return '<button class="sel-btn'+(S.style===id?' active':'')+'" data-style="'+id+'"'+(st.detail?' title="'+esc(st.detail)+'"':'')+'>'+esc(st.label)+'</button>';
      }).join('');
      return '<div class="sel-group"><span class="cat-label"><span class="cat-icon">'+grp.icon+'</span>'+esc(grp.label)+'</span><div class="sel-row">'+btns+'</div></div>';
    }).join('');
    h += '<div class="sec-block"><div class="f-hdr"><label class="lbl">'+t('lStyle')+'</label><span class="hint">'+t('lStyleHint')+'</span></div>'+styleHtml+'</div>';

    /* ATMOSPHERE */
    h += '<div class="secondary-section"><div class="sec-block">' +
      '<div class="three-col" style="grid-template-columns:1fr 1fr 1fr">' +
        '<div class="field"><div class="f-hdr"><label class="lbl">'+t('lLighting')+'</label></div>' +
        '<select id="sel-light">'+LIGHTINGS.map(function(l){return '<option value="'+esc(l.label)+'"'+(S.lighting===l.label?' selected':'')+'>'+(l.label?(S.lang==='ua'?esc(l.labelUa):esc(l.label)):t('noneOpt'))+'</option>';}).join('')+'</select></div>' +
        '<div class="field"><div class="f-hdr"><label class="lbl">'+t('lMood')+'</label></div>' +
        '<select id="sel-mood">'+MOODS.map(function(m){return '<option value="'+esc(m.label)+'"'+(S.mood===m.label?' selected':'')+'>'+(m.label?(S.lang==='ua'?esc(m.labelUa):esc(m.label)):t('noneOpt'))+'</option>';}).join('')+'</select></div>' +
        '<div class="field"><div class="f-hdr"><label class="lbl">'+t('lGenre')+'</label></div>' +
        '<select id="sel-genre">'+GENRES.map(function(g){return '<option value="'+esc(g.label)+'"'+(S.genre===g.label?' selected':'')+'>'+(g.label?(S.lang==='ua'?esc(g.labelUa):esc(g.label)):t('noneOpt'))+'</option>';}).join('')+'</select></div>' +
      '</div></div></div>';
  }

  if (S.mode === 'enhance') {
    var ec = S.existing.length;
    var ecColor = ec>1400?'var(--red)':ec>1000?'var(--amber)':'var(--t4)';

    /* Context row: Scene + Style selects */
    var sceneOpts = SCENES.map(function(sc){ return '<option value="'+esc(sc.id)+'"'+(S.scene===sc.id?' selected':'')+'>'+esc(sc.label)+'</option>'; }).join('');
    var styleOpts = STYLES.map(function(st){ return '<option value="'+esc(st.id)+'"'+(S.style===st.id?' selected':'')+'>'+esc(st.label)+'</option>'; }).join('');
    h += '<div class="secondary-section"><div class="sec-block">' +
      '<div class="f-hdr" style="margin-bottom:4px"><span class="grp-lbl" style="margin-top:0">'+t('lImproveCtx')+'</span></div>' +
      '<div class="three-col" style="grid-template-columns:1fr 1fr">' +
        '<div class="field"><div class="f-hdr"><label class="lbl" style="font-size:10px">'+t('lScene')+'</label></div>' +
        '<select id="sel-enh-scene">'+sceneOpts+'</select></div>' +
        '<div class="field"><div class="f-hdr"><label class="lbl" style="font-size:10px">'+t('lStyle')+'</label></div>' +
        '<select id="sel-enh-style">'+styleOpts+'</select></div>' +
      '</div>' +
      /* Quick presets */
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">' +
        ['fix','zit','enhance'].map(function(p){
          var lbl = p==='fix'?t('presetFix'):p==='zit'?t('presetZIT'):t('presetEnhance');
          var active = S.improvePreset===p;
          return '<button class="btn-ghost'+(active?' p-active':'')+'" data-preset="'+p+'" style="font-size:11px;padding:4px 10px'+(active?';color:var(--acc-txt);border-color:var(--acc)':'')+'">' + lbl + '</button>';
        }).join('') +
      '</div>' +
    '</div></div>';

    /* Existing prompt textarea */
    h += '<div class="field">' +
    '<div class="prompt-main" id="pm-exist">' +
      '<div class="f-hdr">' +
        '<label class="enhance-lbl lbl">'+t('lExisting')+'</label>' +
        '<div style="display:flex;align-items:center;gap:6px">' +
          '<span class="hint">'+t('lExistingHint')+' &nbsp;·&nbsp; <span style="color:'+ecColor+'">'+ec+'/1500</span></span>' +
          '<button class="btn-copy" id="b-cp-exist" style="opacity:.6'+(S.existing.trim()?'':';display:none')+'">'+t('btnCopySubject')+'</button>' +
          '<button class="btn-clr" id="b-clr-exist" title="'+t('btnClearTitle')+'"'+(S.existing.trim()?'':' style="display:none"')+'>✕</button>' +
        '</div>' +
      '</div>' +
      '<textarea id="inp-exist" rows="4" style="min-height:80px" maxlength="1500" placeholder="e.g: beautiful girl, best quality, masterpiece...&#10;&#10;or: дівчина-кіборг у нічному місті">'+esc(S.existing)+'</textarea>' +
    '</div></div>';
  }

  h += '<hr>';

  /* PREVIEW CARD */
  if (S.mode === 'generate') {
    var pvCard = buildPreviewCard();
    h += '<div id="preview-card-wrap">' + (pvCard||'') + '</div>';
  }

  /* ERROR */
  if (S.error) {
    h += '<div class="err-box"><div class="err-title">⚠ Error</div><div class="err-msg">'+esc(S.error)+'</div>' +
      '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">' +
      (!S.loading?'<button class="btn-ghost" id="b-retry" style="font-size:12px;padding:5px 12px;color:var(--acc-txt);border-color:rgba(47,129,247,.35)">'+t('btnRetry')+'</button>':'') +
      (!S.dbgOpen?'<button class="btn-text" id="b-open-dbg" style="color:var(--amber-txt);font-size:12px">→ Debug</button>':'') +
      '</div></div>';
  }

  /* NEG PREVIEW */
  if (S.mode === 'generate') {
    var negDisp   = buildNegative();
    var negCustom = S.customNeg && S.customNeg.trim();
    h += '<div class="neg-preview">' +
      '<span class="neg-preview-label">' + t('pvNeg') + (negCustom?' ✎':'') + '</span>' +
      '<span class="neg-preview-text">'+esc(negDisp)+'</span>' +
    '</div>';
  }

  /* GENERATE ROW */
  var advChanged = isAdvChanged();
  if (S.mode === 'generate') {
    var badgeText = '', badgeClass = 'rnd-badge';
    if (S.rndMode === 'creative') { badgeText='Shift: creative mode'; badgeClass+=' creative'; }
    else if (S.rndMode === 'wild') { badgeText='DblClick: max wild ⚡'; badgeClass+=' wild'; }
    h += '<div class="gen-row">' +
      '<button class="btn-primary'+(S.loading?' loading':'')+'" id="b-gen"'+(S.loading?' disabled':'')+' ' +
        (!mob?'title="Ctrl+Enter" ':'')+
        (!S.loading?'style="box-shadow:0 4px 24px rgba(47,129,247,.28),0 2px 8px rgba(47,129,247,.18),inset 0 1px 0 rgba(255,255,255,.22)"':'')+
        '>' +
        (S.loading
          ? '<span style="display:inline-flex;align-items:center;gap:8px;justify-content:center"><span style="display:inline-block;animation:spin .65s linear infinite;opacity:.7">⟳</span> '+t('btnGenerating')+'</span>'
          : t('btnGenerate')) +
      '</button>' +
      '<button class="btn-random" id="b-random" title="Random subject — Shift: creative — DblClick: wild" style="min-width:48px">🔀</button>' +
      '<button class="btn-adv'+(advChanged?' is-changed':'')+'" id="b-adv" title="'+t('advTooltip')+'">⚙'+(advChanged?'<span class="adv-dot"></span>':'')+'</button>' +
    '</div>' +

    '<div class="'+badgeClass+'" id="rnd-badge">'+badgeText+'</div>';
  } else {
    var improveDisabled = (!S.existing.trim() || S.loading);
    /* Summary bar — visible only when preset is active */
    if (S.improvePreset) {
      var presetLabel = S.improvePreset==='fix'?t('presetFix'):S.improvePreset==='zit'?t('presetZIT'):t('presetEnhance');
      h += '<div style="font-size:10px;color:var(--t3);letter-spacing:.04em;margin-top:6px;margin-bottom:12px;padding:5px 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);line-height:1.7">' +
        '<span style="color:var(--t3)">Preset</span> <span style="color:var(--acc-txt)">'+presetLabel+'</span>' +
      '</div>';
    } else {
      h += '<div style="margin-bottom:12px"></div>';
    }
    h += '<button class="btn-primary'+(S.loading?' loading':'')+(improveDisabled&&!S.loading?' btn-secondary':'')+'" id="b-gen"'+(improveDisabled?' disabled':'')+'>' +
      (S.loading
        ? '<span style="display:inline-flex;align-items:center;gap:8px;justify-content:center"><span style="display:inline-block;animation:spin .65s linear infinite;opacity:.7">⟳</span> '+t('btnGenerating')+'</span>'
        : t('btnOptimize')) +
    '</button>';
  }

  h += '</div>'; /* col-l */
  return h;
}

function buildRightCol(mob, keyOk) {
  var oHide = mob && S.mobilePane !== 'output';
  var h = '<div class="col'+(oHide?' pane-hidden':'')+'">';

  if (mob) {
    h += '<div class="two-col" style="display:grid;margin-bottom:16px">' +
      '<button class="btn-primary'+(S.mobilePane==='params'?'':' btn-secondary')+'" data-pane="params" style="margin-top:0">'+t('mobParams')+'</button>' +
      '<button class="btn-primary'+(S.mobilePane==='output'?'':' btn-secondary')+'" data-pane="output" style="margin-top:0">'+t('mobOutput')+'</button>' +
    '</div>';
  }

  if (mob && S.error && S.mobilePane==='output') {
    h += '<div class="err-box"><div class="err-title">⚠ Error</div><div class="err-msg">'+esc(S.error)+'</div></div>';
  }

  if (!S.result && !S.loading) {
    if (!keyOk) {
      h += '<div class="onboard"><div class="onboard-icon">🔑</div><h2>Add Groq API Key</h2>' +
        '<p>Free key at <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a><br>Press ⚙ API in the top right corner</p>' +
        '<button class="btn-primary" id="b-open-api" style="max-width:240px;margin-top:8px">⚙ Open API Settings</button></div>';
    } else {
      h += '<div class="ph"><div class="ph-icon">◎</div><div class="ph-text">'+t('phFill').replace('\n','<br>')+'</div>' +
        '<div class="ph-sub">'+esc((GROQ_MODELS.find(function(m){return m.id===S.model;})||{name:S.model}).name)+' · AI Image Generation</div></div>';
    }
  }

  if (S.loading) {
    h += '<div class="ph"><div class="spinner"></div><div class="ph-text">Generating prompt…</div>' +
      '<div class="ph-sub">'+esc((GROQ_MODELS.find(function(m){return m.id===S.model;})||{name:S.model}).name)+'</div></div>';
  }

  if (S.result) {
    var r = S.result;
    h += '<div class="output-main is-active">';
    if (r.via !== 'xml') h += '<div class="warn-strip">⚠ Parsed via '+esc(r.via)+' — open Debug for details</div>';

    h += '<div class="sec-block" style="margin-bottom:var(--s3)">' +
      '<div class="out-hdr"><span class="lbl">'+t('outPositive')+'</span>' +
      '<div style="display:flex;align-items:center;gap:8px">' +
      '<span style="font-size:10px;color:var(--t3);opacity:.8">~' + r.positive.trim().split(/\s+/).filter(Boolean).length + ' tokens</span>' +
      '<button class="btn-copy" id="b-cp-pos">'+t('btnCopySubject')+'</button>' +
      '</div></div>' +
      '<div class="out-txt accent" id="out-pos">'+esc(r.positive)+'</div></div>';

    h += '<div class="sec-block" style="margin-bottom:var(--s3)">' +
      '<div class="out-hdr"><span class="lbl">'+t('outNegative')+'</span><button class="btn-copy" id="b-cp-neg">'+t('btnCopySubject')+'</button></div>' +
      '<div class="out-txt" id="out-neg">'+esc(r.negative)+'</div></div>';

    h += '<div class="output-actions">' +
      '<button class="btn-ghost btn-regen" id="b-regen"><span class="act-icon">↺</span> '+t('btnRegenerate')+'</button>' +
      '<button class="btn-ghost btn-icon-sq" id="b-cp-all" title="'+t('btnCopy')+'" style="color:var(--acc-txt);border-color:rgba(47,129,247,.3)">⧉</button>' +
      (tg ? '<button class="btn-ghost btn-icon-sq" id="b-share" title="Share prompt" style="color:var(--acc-txt);border-color:rgba(47,129,247,.3)">⤴</button>' : '') +
      '<button class="btn-ghost btn-icon-sq" id="b-hist" title="'+t('histBtnTitle')+'">📜</button>' +
    '</div>';

    h += '<button class="btn-ghost" id="b-improve-this" style="' +
      'width:100%;margin-bottom:var(--s3);' +
      'color:var(--acc-txt);border-color:rgba(47,129,247,.3);' +
      'font-size:12px;padding:7px 12px' +
    '">' + t('btnImproveThis') + '</button>';

    var pp = r.params;
    var pcards = [['Steps',pp.steps],['CFG',pp.cfg],['Sampler',pp.sampler],['Scheduler',pp.scheduler],['Resolution',pp.resolution],['Seed',pp.seed]];
    h += '<div class="f-hdr" style="margin-bottom:8px"><span class="lbl">'+t('outParams')+'</span></div>' +
      '<div class="params-grid">'+pcards.map(function(x){return '<div class="p-card"><span class="p-key">'+x[0]+'</span><span class="p-val">'+esc(x[1])+'</span></div>';}).join('')+'</div>';

    if (r.changes) h += '<div class="info-card"><span class="lbl">'+t('outChanged')+'</span><p>'+esc(r.changes)+'</p></div>';
    if (r.notes)   h += '<div class="info-card"><span class="lbl">'+t('outTip')+'</span><p>'+esc(r.notes)+'</p></div>';

    h += '</div>'; /* output-main */
  }

  h += '</div>'; /* col-r */
  return h;
}

function buildAdvPanel() {
  if (!S.advOpen) return '';
  var SAMP_SHORT2 = { 'euler_ancestral':'euler_a', 'euler':'euler', 'dpm_2':'dpm_2', 'heun':'heun', 'dpm_2_ancestral':'dpm2_a' };

function buildHistPanel() {
  if (!S.histOpen) return '';
  var hist = loadHistory();
  var items = '';
  if (!hist.length) {
    items = '<div class="hist-empty">' + t('histEmpty') + '</div>';
  } else {
    items = hist.map(function(h, i) {
      var d = new Date(h.ts);
      var timeStr = d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0') + ' · ' +
                    d.getDate() + '.' + String(d.getMonth()+1).padStart(2,'0');
      var sceneStyle = esc((h.scene||'') + ' / ' + (h.style||''));
      var subjectDisp = h.subject ? esc(h.subject.slice(0,80)) : esc(h.positive.slice(0,80));
      return '<div class="hist-item" data-hist-i="'+i+'">' +
        '<div class="hist-meta">' +
          '<span class="hist-scene-style">'+sceneStyle+'</span>' +
          '<span class="hist-time">'+timeStr+'</span>' +
        '</div>' +
        '<div class="hist-subject">'+subjectDisp+'</div>' +
        '<div class="hist-positive">'+esc(h.positive.slice(0,120))+'</div>' +
        '<div style="display:flex;gap:6px;margin-top:7px">' +
          '<button class="btn-ghost" data-hist-insert="'+i+'" style="font-size:11px;padding:3px 8px">'+t('histInsert')+'</button>' +
          '<button class="btn-ghost" data-hist-use="'+i+'" style="font-size:11px;padding:3px 8px;color:var(--acc-txt);border-color:rgba(47,129,247,.3)">'+t('histUse')+'</button>' +
          '<button class="btn-copy" data-hist-copy="'+i+'" style="font-size:11px;padding:3px 8px;margin-left:auto">⎘ '+t('histCopyItem')+'</button>' +
          '<button class="btn-clr" data-hist-del="'+i+'" style="font-size:11px;padding:3px 8px">✕</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  return '<div class="adv-overlay" id="hist-overlay"></div>' +
  '<div class="adv-sheet" id="hist-sheet">' +
    '<div class="adv-handle"></div>' +
    '<div class="adv-hdr">' +
      '<span class="adv-title">' + t('histTitle') + '</span>' +
      '<div style="display:flex;gap:8px;align-items:center">' +
        (hist.length ? '<button class="btn-ghost" id="b-hist-clr" style="font-size:11px;padding:3px 8px;color:var(--red-txt)">'+t('histClear')+'</button>' : '') +
        '<button class="btn-ghost" id="b-hist-close" style="padding:3px 8px">✕</button>' +
      '</div>' +
    '</div>' +
    '<div class="adv-body">' + items + '</div>' +
  '</div>';
}

function buildHTML() {
  var mob   = window.innerWidth <= 680;
  var keyOk = PROXY_URL ? true : !!S.apiKey.trim();
  return [
    buildHeader(mob, keyOk),
    buildApiPanel(),
    buildDebugPanel(),
    buildTabBar(mob),
    '<div class="body-grid">',
      buildLeftCol(mob),
      buildRightCol(mob, keyOk),
    '</div>',
    buildAdvPanel(),
    buildHistPanel(),
  ].join('');
}

/* ═══════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════ */
function attachEvents() {
  function on(id, ev, fn) { var el=document.getElementById(id); if(el) el.addEventListener(ev,fn); }

  /* prevent duplicate keyboard listener on re-render */
  document.removeEventListener('keydown', _kbHandler);
  document.addEventListener('keydown', _kbHandler);

  on('b-api',       'click', function(){ S.apiOpen=!S.apiOpen; render(); });
  on('b-dbg-open',  'click', function(){ S.dbgOpen=!S.dbgOpen; render(); });
  on('b-api-close', 'click', function(){ S.apiOpen=false; S.dbgOpen=false; render(); });
  on('b-dbg-close', 'click', function(){ S.dbgOpen=false; render(); });
  on('b-open-api',  'click', function(){ S.apiOpen=true; render(); });
  on('b-open-dbg',  'click', function(){ S.dbgOpen=true; render(); });

  /* ── ADVANCED PANEL ── */
  on('b-adv', 'click', function(){ S.advOpen=true; render(); });

  /* ── HISTORY PANEL ── */
  on('b-hist',       'click', function(){ S.histOpen=true; render(); });
  on('b-hist-close', 'click', function(){ S.histOpen=false; render(); });
  on('b-hist-clr',   'click', function(){ clearHistory(); S.histOpen=false; render(); });

  (function(){
    var ov = document.getElementById('hist-overlay');
    if (ov) ov.addEventListener('click', function(){ S.histOpen=false; render(); });
  }());

  /* History — Use this (closes panel, switches to Improve mode) */
  document.querySelectorAll('[data-hist-use]').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      var i = +el.dataset.histUse;
      var hist = loadHistory();
      var entry = hist[i];
      if (!entry) return;
      S.existing = entry.positive;
      S.mode = 'enhance';
      S.mobilePane = 'params';
      S.histOpen = false;
      S.error = '';
      render();
      requestAnimationFrame(function(){
        var ta = document.getElementById('inp-exist');
        if (ta) { ta.focus(); ta.scrollIntoView({ behavior:'smooth', block:'center' }); }
      });
    });
  });

  /* History — Insert (вставляє в existing, панель лишається відкритою) */
  document.querySelectorAll('[data-hist-insert]').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      var i = +el.dataset.histInsert;
      var hist = loadHistory();
      var entry = hist[i];
      if (!entry) return;
      S.existing = entry.positive;
      S.mode = 'enhance';
      S.mobilePane = 'params';
      S.error = '';
      render();
      requestAnimationFrame(function(){
        var ta = document.getElementById('inp-exist');
        if (ta) { ta.focus(); ta.scrollIntoView({ behavior:'smooth', block:'center' }); }
      });
    });
  });

  on('b-hist-subj', 'click', function(){ S.histOpen=true; render(); });

  /* History — Copy item (копіює positive, панель лишається відкритою) */
  document.querySelectorAll('[data-hist-copy]').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      var i = +el.dataset.histCopy;
      var hist = loadHistory();
      var entry = hist[i];
      if (!entry) return;
      copyText(entry.positive, el);
    });
  });

  /* History — Delete item (видаляє один запис, панель лишається відкритою) */
  document.querySelectorAll('[data-hist-del]').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      var i = +el.dataset.histDel;
      deleteHistoryItem(i);
      render();
    });
  });
  on('b-adv-close', 'click', function(){ S.advOpen=false; render(); });
  on('b-adv-apply', 'click', function(){ S.advOpen=false; render(); });
  on('b-adv-reset', 'click', function(){ resetAdv(); render(); });
  on('b-adv-neg-clr', 'click', function(){ S.customNeg=''; render(); });

  /* tap overlay to close */
  (function(){
    var ov = document.getElementById('adv-overlay');
    if (ov) ov.addEventListener('click', function(){ S.advOpen=false; render(); });
  }());

  /* custom neg live */
  (function(){
    var el = document.getElementById('inp-custom-neg');
    if (!el) return;
    el.addEventListener('input', function(){
      S.customNeg = el.value;
      patch('neg');
      patch('advBtn');
    });
  }());

  /* ── GENRE CHIP EXPAND ── */
  document.querySelectorAll('.genre-tok').forEach(function(el){
    el.addEventListener('click', function(){ el.classList.toggle('expanded'); });
  });
  on('b-lang',      'click', function(){
    var btn = document.getElementById('b-lang');
    S.lang = S.lang === 'en' ? 'ua' : 'en';
    try { localStorage.setItem('zit_lang', S.lang); } catch(e) {}
    saveState();
    if (btn) {
      btn.classList.remove('pill-lang-fired'); void btn.offsetWidth; btn.classList.add('pill-lang-fired');
      setTimeout(render, 380);
    } else {
      render();
    }
  });

  document.querySelectorAll('[data-pane]').forEach(function(el){ el.addEventListener('click', function(){ S.mobilePane=el.dataset.pane; render(); }); });
  document.querySelectorAll('[data-mode]').forEach(function(el){ el.addEventListener('click', function(){
    var newMode = el.dataset.mode;
    if (newMode === 'enhance' && !S.existing.trim() && S.result) {
      S.existing = S.result.positive;
    }
    S.mode = newMode;
    S.error = '';
    render();
  }); });
  document.querySelectorAll('[data-scene]').forEach(function(el){ el.addEventListener('click', function(){ S.scene=el.dataset.scene; saveState(); render(); }); });
  document.querySelectorAll('[data-style]').forEach(function(el){ el.addEventListener('click', function(){ S.style=el.dataset.style; saveState(); render(); }); });
  document.querySelectorAll('[data-subtype]').forEach(function(el){ el.addEventListener('click', function(){ S.subjectType=el.dataset.subtype; saveState(); render(); }); });

  document.querySelectorAll('[data-hist]').forEach(function(el){
    el.addEventListener('click', function(){
      var i = +el.dataset.hist;
      S.subject = S.subjectHistory[i] || S.subject;
      render();
      requestAnimationFrame(function(){
        var ta = document.getElementById('inp-sub');
        if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
      });
    });
  });

  function live(id, key){ var el=document.getElementById(id); if(el) el.addEventListener('input',function(){
    S[key]=el.value;
  }); }
  var _subSaveTimer = null;
  function saveSubjectDebounced() {
    clearTimeout(_subSaveTimer);
    _subSaveTimer = setTimeout(function(){ saveState(); }, 800);
  }

  function liveAndSave(id, key){ var el=document.getElementById(id); if(el) el.addEventListener('input',function(){ S[key]=el.value; saveState(); }); }
  function liveAndSave(id, key){ var el=document.getElementById(id); if(el) el.addEventListener('input',function(){ S[key]=el.value; saveState(); }); }
  liveAndSave('inp-steps','steps'); liveAndSave('inp-cfg','cfg'); liveAndSave('inp-seed','seed');

  /* ── валідація числових полів при blur ───────────────
     clamp значень щоб не передати сміття в API request  */
  (function bindNumericValidation(){
    var numFields = [
      { id:'inp-steps', key:'steps', parse:parseInt,   min:1,   max:150, def:12   },
      { id:'inp-cfg',   key:'cfg',   parse:parseFloat, min:0.1, max:10,  def:1.5  },
      { id:'inp-seed',  key:'seed',  parse:parseInt,   min:0,   max:4294967295, def:'' }
    ];
    numFields.forEach(function(f){
      var el = document.getElementById(f.id);
      if (!el) return;
      el.addEventListener('blur', function(){
        var v = f.parse(el.value, 10);
        if (isNaN(v)) {
          S[f.key] = f.key === 'seed' ? '' : String(f.def);
        } else {
          S[f.key] = String(Math.min(f.max, Math.max(f.min, v)));
        }
        el.value = S[f.key];
        saveState();
      });
    });
  })();
  (function(){
    var ta = document.getElementById('inp-sub');
    if (!ta) return;
    ['input','paste','change'].forEach(function(ev){
      ta.addEventListener(ev, function(){
        S.subject = ta.value;
        saveSubjectDebounced();
        patch('preview');
        autoResize(ta);
        var cnt = document.getElementById('sub-count');
        if (cnt) {
          cnt.textContent = ta.value.length || '';
          cnt.style.color = ta.value.length > 300 ? 'var(--amber)' : 'var(--t3)';
        }
        var hasText = !!ta.value.trim();
        var cpBtn = document.getElementById('b-cp-sub');
        var clBtn = document.getElementById('b-clr-sub');
        if (cpBtn) cpBtn.style.display = hasText ? '' : 'none';
        if (clBtn) clBtn.style.display = hasText ? '' : 'none';
      });
    });
  }());

  (function(){
    var ta = document.getElementById('inp-sub');
    var pm = ta && ta.closest('.prompt-main');
    if (!ta || !pm) return;
    ta.addEventListener('focus', function(){ pm.classList.add('is-focus'); });
    ta.addEventListener('blur',  function(){ pm.classList.remove('is-focus','is-typing'); });
    ta.addEventListener('input', function(){ pm.classList.add('is-typing'); });
  }());

  var existEl = document.getElementById('inp-exist');
  if (existEl) {
    var pmExist = document.getElementById('pm-exist');
    if (pmExist) {
      existEl.addEventListener('focus', function(){ pmExist.classList.add('is-focus'); });
      existEl.addEventListener('blur',  function(){ pmExist.classList.remove('is-focus','is-typing'); });
      existEl.addEventListener('input', function(){ pmExist.classList.add('is-typing'); });
    }
    existEl.addEventListener('input', function(){
      S.existing = existEl.value;
      autoResize(existEl);
      var hint = existEl.closest('.field').querySelector('.hint span');
      if (hint) { var n=existEl.value.length; hint.textContent=n+'/1500'; hint.style.color=n>1400?'var(--red)':n>1000?'var(--amber)':'var(--t4)'; }
      var hasText = !!existEl.value.trim();
      var cpBtn = document.getElementById('b-cp-exist');
      var clBtn = document.getElementById('b-clr-exist');
      if (cpBtn) cpBtn.style.display = hasText ? '' : 'none';
      if (clBtn) clBtn.style.display = hasText ? '' : 'none';
      patch('genBtn');
    });
  }
  function lsel(id,key){ var el=document.getElementById(id); if(el) el.addEventListener('change',function(){ S[key]=el.value; saveState(); render(); }); }
  /* lighting/mood/genre → only preview needs update, no structural change */
  function lselPatch(id,key){ var el=document.getElementById(id); if(el) el.addEventListener('change',function(){ S[key]=el.value; saveState(); patch('preview'); }); }
  lselPatch('sel-light','lighting'); lselPatch('sel-mood','mood'); lselPatch('sel-genre','genre');
  lsel('sel-enh-scene','scene'); lsel('sel-enh-style','style');
  lsel('sel-res','resolution'); lsel('sel-samp','sampler'); lsel('sel-sch','scheduler');

  document.querySelectorAll('[data-preset]').forEach(function(el){
    el.addEventListener('click', function(){
      S.improvePreset = (S.improvePreset === el.dataset.preset) ? '' : el.dataset.preset;

  });

  document.querySelectorAll('[data-ln]').forEach(function(el){ el.addEventListener('input',function(){ S.loras[+el.dataset.ln].name=el.value; saveState(); }); });

    el.addEventListener('click',function(){ S.loras.splice(+el.dataset.lr,1); saveState(); render(); });

  on('b-seed','click',function(){ S.seed=String(Math.floor(Math.random()*1e9)); var el=document.getElementById('inp-seed'); if(el) el.value=S.seed; var sv=document.getElementById('tc-seed-val'); if(sv) sv.textContent=S.seed; });

  var ki=document.getElementById('inp-key');
  if(ki) ki.addEventListener('input',function(){ var chk=document.getElementById('chk-rem'); saveKey(ki.value, chk?chk.checked:false); });
  var cr=document.getElementById('chk-rem');
  if(cr) cr.addEventListener('change',function(){ var k=document.getElementById('inp-key'); saveKey(k?k.value:S.apiKey, cr.checked); });
  on('b-key-clr','click',function(){ clearKey(); render(); });

  document.querySelectorAll('.model-card').forEach(function(card){
    card.addEventListener('click', function(){
      var val = card.dataset.model;
      if (val) { S.model = val; saveState(); render(); }
    });
  });

  on('b-gen','click',generate);
  on('b-regen','click',generate);
  on('b-retry','click',generate);

  /* VISION — drop-zone click */
  on('b-vision','click',function(){
    var fi = document.getElementById('inp-vision-file');
    if (fi) { fi.value=''; fi.click(); }
  });

  /* VISION — retry (reset success state) */
  on('b-vision-retry','click',function(){
    S.visionSuccess = false;
    renderImmediate();
  });

  /* VISION — file input change */
  (function attachVisionInput(){
    var fi = document.getElementById('inp-vision-file');
    if (fi) {
      fi.addEventListener('change', function(){
        if (fi.files && fi.files[0]) analyzeImage(fi.files[0]);
      });
    }
  })();

  /* VISION — drag & drop на drop-zone */
  (function attachVisionDrop(){
    var app = document.getElementById('app');
    if (!app || app.dataset.dndBound) return; /* guard — не навішувати повторно */
    app.dataset.dndBound = '1';
    app.addEventListener('dragover', function(e){
      if (!e.dataTransfer || !e.dataTransfer.types) return;
      var hasFile = Array.prototype.indexOf.call(e.dataTransfer.types, 'Files') !== -1;
      if (!hasFile) return;
      e.preventDefault();
      var zone = document.getElementById('b-vision');
      if (zone) zone.classList.add('drag-over');
    });
    app.addEventListener('dragleave', function(e){
      var zone = document.getElementById('b-vision');
      if (zone && !zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
    });
    app.addEventListener('drop', function(e){
      var zone = document.getElementById('b-vision');
      if (zone) zone.classList.remove('drag-over');
      if (!e.dataTransfer || !e.dataTransfer.files || !e.dataTransfer.files[0]) return;
      var file = e.dataTransfer.files[0];
      if (!file.type.startsWith('image/')) return;
      e.preventDefault();
      analyzeImage(file);
    });
  })();
  on('b-improve-this', 'click', function() {
    if (!S.result) return;
    S.existing = S.result.positive;
    S.mode = 'enhance';
    S.mobilePane = 'params'; /* на mobile — показати ліву колонку з textarea */

      var ta = document.getElementById('inp-exist');
      if (ta) {
        ta.focus();
        ta.setSelectionRange(0, 0);
        ta.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  });

  /* ── RANDOM BUTTON ── */
  var rndBtn = document.getElementById('b-random');
  if (rndBtn) {
    rndBtn.addEventListener('click', function(e) {
      var mode = e.shiftKey ? 'creative' : 'normal';
      S.rndMode = mode;
      rndBtn.classList.remove('fired');
      void rndBtn.offsetWidth;
      rndBtn.classList.add('fired');
      setTimeout(function(){ rndBtn.classList.remove('fired'); }, 250);
      doRandom(mode);
      var badge = document.getElementById('rnd-badge');
      if (badge) {
        badge.textContent = mode==='creative' ? 'Shift: creative mode' : '';
        badge.className = 'rnd-badge' + (mode==='creative'?' creative':'');
      }
    });

    rndBtn.addEventListener('dblclick', function(e) {
      e.stopPropagation();
      S.rndMode = 'wild';
      rndBtn.classList.remove('fired');
      void rndBtn.offsetWidth;
      rndBtn.classList.add('fired');
      setTimeout(function(){ rndBtn.classList.remove('fired'); }, 250);
      doRandom('wild');
      var badge = document.getElementById('rnd-badge');
      if (badge) { badge.textContent='DblClick: max wild ⚡'; badge.className='rnd-badge wild'; }
      setTimeout(function(){ S.rndMode='normal'; var b=document.getElementById('rnd-badge'); if(b){b.textContent='';b.className='rnd-badge';} }, 3000);
    });
  }

  on('b-cp-sub','click',function(e){ if(S.subject.trim()) copyText(S.subject, e.currentTarget); });
  on('b-cp-exist','click',function(e){ if(S.existing.trim()) copyText(S.existing, e.currentTarget); });
  on('b-clr-exist','click',function(){
    var btn = document.getElementById('b-clr-exist');
    if (btn) { btn.classList.add('cleared'); btn.textContent = '✓'; }
    setTimeout(function(){
      S.existing = '';
      render();
      requestAnimationFrame(function(){
        var ta = document.getElementById('inp-exist');
        if (ta) ta.focus();
      });
    }, 400);
  });
  on('b-clr-sub','click',function(){
    var btn = document.getElementById('b-clr-sub');
    if (btn) { btn.classList.add('cleared'); btn.textContent = '✓'; }
    setTimeout(function(){
      S.subject = '';
      render();
      requestAnimationFrame(function(){
        var ta = document.getElementById('inp-sub');
        if (ta) ta.focus();
      });
    }, 400);
  });
  on('b-cp-pos','click',function(e){ if(S.result) copyText(S.result.positive, e.currentTarget); });
  on('b-cp-neg','click',function(e){ if(S.result) copyText(S.result.negative, e.currentTarget); });
  on('b-share', 'click', sharePrompt);
  on('b-cp-all','click',function(e){
    if (!S.result) return;
    var p=S.result.params;
    copyText('Positive: '+S.result.positive+'\nNegative: '+S.result.negative+'\n\nSteps: '+p.steps+' | CFG: '+p.cfg+' | Sampler: '+p.sampler+' | Scheduler: '+p.scheduler+'\nResolution: '+p.resolution+' | Seed: '+p.seed, e.currentTarget);
  });
  on('b-cp-log','click',function(){ var btn=document.getElementById('b-cp-log'); if(S.dbgLog&&btn) copyText(JSON.stringify(S.dbgLog,null,2), btn); });

  /* ── auto-resize textarea on every render ── */
  requestAnimationFrame(function(){
    var ta = document.getElementById('inp-sub');
    if (ta) autoResize(ta);
    var te = document.getElementById('inp-exist');
    if (te) autoResize(te);
  });

  /* ── swipe between panels on mobile ── */
  attachSwipe();
}

function attachSwipe() {
  if (window.innerWidth > 680) return;
  var body = document.querySelector('.body-grid');
  if (!body) return;
  var x0 = null, y0 = null;
  body.addEventListener('touchstart', function(e) {
    x0 = e.touches[0].clientX;
    y0 = e.touches[0].clientY;
  }, { passive: true });
  body.addEventListener('touchend', function(e) {
    if (x0 === null || y0 === null) return;
    var dx = e.changedTouches[0].clientX - x0;
    var dy = e.changedTouches[0].clientY - y0;
    x0 = null; y0 = null;
    /* горизонтальний рух має бути мінімум вдвічі більший за вертикальний */
    if (Math.abs(dy) > Math.abs(dx) * 0.4) return;
    /* мінімальний поріг 80px щоб уникнути випадкових дотиків */
    if (Math.abs(dx) < 80) return;
    S.mobilePane = dx < 0 ? 'output' : 'params';
    render();
  }, { passive: true });
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
loadKey();
loadState();
render();
var _rt;
window.addEventListener('resize', function(){ clearTimeout(_rt); _rt=setTimeout(render,150); });

/* ── KEYBOARD SHORTCUTS ── */
function _kbHandler(e) {
  /* Ctrl+Enter або Cmd+Enter → generate */
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    if (!S.loading) generate();
    return;
  }
  /* Escape → закрити будь-яку відкриту панель */
  if (e.key === 'Escape') {
    if (S.advOpen || S.apiOpen || S.dbgOpen || S.histOpen) {
      S.advOpen = false;
      S.apiOpen = false;
      S.dbgOpen = false;
      S.histOpen = false;
      render();
    }
    return;
  }
}
</script>
